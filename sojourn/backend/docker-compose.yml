services:
  db:
    image: mysql:8.4
    container_name: sojourn-mysql
    environment:
      MYSQL_DATABASE: sojourn
      MYSQL_USER: sojourn
      MYSQL_PASSWORD: sojourn
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usojourn", "-psojourn"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
